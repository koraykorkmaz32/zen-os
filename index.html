<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen OS | Pro Terminal</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'ZenOS','short_name':'ZenOS','start_url':'.','display':'standalone','background_color':'#020617','theme_color':'#38bdf8'}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        /* --- TASARIM VE DEĞİŞKENLER --- */
        :root { --bg: #020617; --panel: rgba(15, 23, 42, 0.85); --accent: #38bdf8; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1); }
        [data-theme="zen"] { --bg: #fff5f8; --panel: rgba(255, 255, 255, 0.98); --accent: #ff7eb9; --text: #2d3436; --border: rgba(255, 126, 185, 0.2); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* MOBİL KAYMA ENGELLEYİCİ ANA KİLİT */
        html, body { overflow-x: hidden; width: 100%; max-width: 100vw; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; min-height: 100vh; padding: 15px; user-select: none; }
        .container { max-width: 1700px; margin: 0 auto; display: none; width: 100%; }
        
        #loadingScreen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* GRID MİMARİSİ */
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; }
        .panel { background: var(--panel); backdrop-filter: blur(15px); border-radius: 28px; padding: 22px; border: 1px solid var(--border); height: 100%; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 100%; }
        h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px 30px; background: var(--panel); border-radius: 24px; border: 1px solid var(--border); width: 100%; }
        .welcome-text { font-size: 1.2rem; font-weight: 700; }

        /* SU TAKİBİ */
        .water-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; width: 100%; margin-top: 5px; }
        .glass { aspect-ratio: 1/1.5; border: 3px solid var(--accent); border-radius: 8px 8px 20px 20px; cursor: pointer; transition: 0.3s; background: rgba(56, 189, 248, 0.05); display: flex; align-items: center; justify-content: center; min-height: 60px; }
        .glass.active { background: var(--accent); box-shadow: 0 0 25px var(--accent); transform: scale(0.92); }
        .glass svg { width: 22px; height: 22px; color: var(--accent); }
        .glass.active svg { color: var(--bg); }

        /* TAKVİM */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .cal-day { aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .cal-day:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .cal-day.today { border: 2.5px solid var(--accent); color: var(--accent); font-weight: 800; }
        .day-indicators { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 4px; font-size: 1.1rem; }

        /* HABIT TRACKER TABLOSU */
        .habit-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .habit-table th { font-size: 0.7rem; color: var(--accent); padding: 10px; text-align: center; }
        .habit-table td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; }
        .check-box { width: 24px; height: 24px; border: 2.5px solid var(--accent); border-radius: 7px; cursor: pointer; margin: 0 auto; transition: 0.2s; background: transparent; display: flex; align-items: center; justify-content: center; }
        .check-box.checked { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
        .check-box.checked::after { content: '✓'; color: #000; font-size: 14px; font-weight: 900; }

        /* UI ELEMANLARI */
        .btn-primary { background: var(--accent); color: #000; border: none; padding: 12px 18px; border-radius: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); padding: 12px; border-radius: 14px; cursor: pointer; }
        .input-field { background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; width: 100%; font-family: inherit; outline: none; }
        .item-list { list-style: none; overflow-y: auto; flex: 1; width: 100%; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,255,255,0.04); border-radius: 12px; margin-bottom: 6px; font-size: 0.85rem; width: 100%; }

        /* MODAL VE YEMEK PLANI */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; width: 100vw; height: 100vh; }
        .hidden { display: none !important; }
        .emoji-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .emoji-btn { font-size: 1.5rem; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .emoji-btn.active { border-color: var(--accent); background: rgba(56, 189, 248, 0.1); }
        .meal-table { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; }
        .meal-day { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; border: 1px solid var(--border); }
        .meal-day h4 { font-size: 0.8rem; color: var(--accent); text-align: center; margin-bottom: 8px; }
        .meal-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.7rem; padding: 6px; margin-bottom: 4px; border: none; outline: none; }
        .meal-label { font-size: 0.55rem; opacity: 0.4; display: block; margin-bottom: 2px; }

        /* MOBİL STACK (SIKI KİLİT) */
        @media (max-width: 1024px) {
            .grid-layout { grid-template-columns: 1fr; gap: 10px; }
            .panel { grid-column: span 1 !important; height: auto; padding: 15px; } /* Mobilde padding kısıldı */
            .meal-table { grid-template-columns: 1fr; }
            .water-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; } /* Mobilde bardak aralığı kısıldı */
            .glass { min-height: 50px; }
            .top-bar { flex-direction: column; gap: 15px; text-align: center; padding: 15px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loadingScreen">
    <div class="spinner"></div>
    <div style="font-weight: 600; color: var(--accent); letter-spacing: 2px;">ZEN OS BAŞLATILIYOR...</div>
</div>

<div class="container" id="mainApp">
    <header class="top-bar">
        <div class="welcome-text">Hoş geldin, <span id="userNameDisp">Şef</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-primary" onclick="toggleTheme()" title="Tema"><i data-lucide="sun"></i></button>
            <button class="btn-primary" onclick="exportPDF()" title="PDF İndir"><i data-lucide="download"></i></button>
            <button class="btn-primary" onclick="toggleModal('settingsModal')" title="Ayarlar"><i data-lucide="settings"></i></button>
            <button class="btn-primary" onclick="logOut()" title="Çıkış Yap" style="background: #ef4444; color: #fff;"><i data-lucide="log-out"></i></button>
        </div>
    </header>

    <main class="grid-layout" id="captureArea">
        <section class="panel" style="grid-column: span 1;">
            <h2><i data-lucide="quote"></i> Motivasyon</h2>
            <div style="flex:1; display:flex; align-items:center; justify-content:center; text-align:center;">
                <p id="quoteBox" style="font-style:italic; font-size: 1.1rem; font-weight: 300;"></p>
            </div>
        </section>

        <section class="panel" style="grid-column: span 1;">
            <h2><i data-lucide="zap"></i> Deep Focus</h2>
            <div style="text-align: center; flex:1; display:flex; flex-direction:column; justify-content:center;">
                <div id="timerDisp" style="font-size: 3.2rem; font-weight: 800; margin-bottom: 10px;">25:00</div>
                <div style="display: flex; gap: 5px; flex-direction: column;">
                    <input type="number" id="timerMin" value="25" class="input-field" style="text-align:center">
                    <div style="display: flex; gap: 5px;">
                        <button class="btn-primary" id="timerCtrl" style="flex:2">Başlat</button>
                        <button class="btn-secondary" onclick="Focus.reset()" style="flex:1"><i data-lucide="rotate-ccw" style="width:16px"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel" style="grid-column: span 2;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i data-lucide="droplet"></i> Su Takibi</h2>
                <span id="waterText" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">0 / 2000 ml</span>
            </div>
            <div class="water-grid" id="waterGrid"></div>
        </section>

        <section class="panel" style="grid-column: span 2;">
            <div class="cal-nav">
                <h2><i data-lucide="calendar"></i> Planlayıcı</h2>
                <div style="display:flex; align-items:center; gap:8px">
                    <button onclick="Cal.prev()" class="btn-secondary" style="padding:5px 10px"> < </button>
                    <span id="calMonthTitle" style="font-weight:800; font-size:0.9rem"></span>
                    <button onclick="Cal.next()" class="btn-secondary" style="padding:5px 10px"> > </button>
                </div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </section>

        <section class="panel">
            <h2><i data-lucide="check-square"></i> To-Do List</h2>
            <div style="display:flex; gap:8px; margin-bottom:12px">
                <input id="todoIn" class="input-field" placeholder="Ekle...">
                <button class="btn-primary" onclick="Lists.add('todo')">+</button>
            </div>
            <ul id="todoList" class="item-list"></ul>
        </section>

        <section class="panel">
            <h2><i data-lucide="wallet"></i> Bütçe Takibi</h2>
            <div style="display:flex; gap:8px; margin-bottom:12px">
                <input id="budgetIn" class="input-field" placeholder="Gider: 500">
                <button class="btn-primary" onclick="Lists.add('budget')">+</button>
            </div>
            <div style="text-align:right; font-weight:800; color:var(--accent); font-size:1.1rem; margin-bottom:8px">Toplam: <span id="budgetTotal">0</span> TL</div>
            <ul id="budgetList" class="item-list"></ul>
        </section>

        <section class="panel" style="grid-column: span 4;">
            <h2><i data-lucide="utensils"></i> Haftalık Yemek Planı (5 Öğün)</h2>
            <div class="meal-table" id="mealGrid"></div>
        </section>

        <section class="panel" style="grid-column: span 4;">
            <h2><i data-lucide="activity"></i> Alışkanlık Takibi (Haftalık - 10 Satır)</h2>
            <div style="overflow-x: auto; width: 100%;">
                <table class="habit-table">
                    <thead id="habitHead"></thead>
                    <tbody id="habitGrid"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<div id="settingsModal" class="modal hidden">
    <div class="panel" style="width: 350px;">
        <h2>Ayarlar</h2>
        <input id="userNameIn" class="input-field" placeholder="İsminiz...">
        <button class="btn-primary" onclick="saveProfile()" style="width:100%; margin-top:12px">Kaydet</button>
        <button class="btn-secondary" onclick="toggleModal('settingsModal')" style="width:100%; margin-top:8px">Kapat</button>
    </div>
</div>

<div id="calModal" class="modal hidden">
    <div class="panel" style="width: 420px; max-height:90vh">
        <h2 id="calModalTitle">Tarih</h2>
        <div class="emoji-selector" id="emojiSelector">
            <button class="emoji-btn active" onclick="Cal.selEmoji('💖')">💖</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('🌸')">🌸</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('🧘‍♀️')">🧘‍♀️</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('🛍️')">🛍️</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('📖')">📖</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('☕')">☕</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('🎀')">🎀</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('✨')">✨</button>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px">
            <input id="calNoteIn" class="input-field" placeholder="Notunuz...">
            <button class="btn-primary" onclick="Cal.addNote()">Ekle</button>
        </div>
        <ul id="calNoteList" class="item-list"></ul>
        <button class="btn-secondary" onclick="toggleModal('calModal')" style="width:100%; margin-top:10px">Kapat</button>
    </div>
</div>

<script>
    lucide.createIcons();

    /* =========================================
       1. FIREBASE BAĞLANTISI VE KORUMA
       ========================================= */
    const firebaseConfig = {
        apiKey: "AIzaSyACMszR6WT9YHxgpKTQk9FJtWZzEj2SKZk",
        authDomain: "productdashboard-12fd0.firebaseapp.com",
        databaseURL: "https://productdashboard-12fd0-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "productdashboard-12fd0",
        storageBucket: "productdashboard-12fd0.firebasestorage.app",
        messagingSenderId: "273234191782",
        appId: "1:273234191782:web:2d611bf016ed9ffdd4db67",
        measurementId: "G-QHXLWNWYN6"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    let currentUid = null;

    // DOMAIN KİLİDİ
    const allowedDomains = ["localhost", "127.0.0.1", "koraykorkmaz32.github.io"];
    if (!allowedDomains.includes(window.location.hostname) && window.location.hostname !== "") {
        document.body.innerHTML = "<h1 style='color:red;text-align:center;margin-top:20%'>Lisanssız Kullanım Engellendi.</h1>";
    }

    // AUTH GUARD (Giriş yapmayanı kov)
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "login.html"; // ÇELİK KAPI: GİRİŞ YAPMAYAN BURAYA DÜŞER
        } else {
            currentUid = user.uid;
            
            // İsmi Buluttan Çek
            db.ref('users/' + user.uid + '/fullName').once('value').then(snap => {
                if(snap.exists()) {
                    document.getElementById('userNameDisp').innerText = snap.val();
                    document.getElementById('userNameIn').value = snap.val();
                }
            });

            // Verileri Buluttan İndir ve Sistemi Başlat
            DB.syncFromCloud().then(() => {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                startApp();
            });
        }
    });

    function logOut() {
        // Çıkış yaparken önceki kişinin verilerini tarayıcıdan temizle
        for (let key in localStorage) {
            if (key.startsWith('zen_') && key !== 'zen_theme') { 
                localStorage.removeItem(key);
            }
        }
        auth.signOut().then(() => { window.location.href = "login.html"; });
    }

    /* =========================================
       2. HİBRİT VERİTABANI (Local + Cloud)
       ========================================= */
    const DB = {
        get: (k) => JSON.parse(localStorage.getItem(k)),
        set: (k, v) => {
            localStorage.setItem(k, JSON.stringify(v));
            if(currentUid) db.ref('users/' + currentUid + '/data/' + k).set(v);
        },
        syncFromCloud: async () => {
            const snap = await db.ref('users/' + currentUid + '/data').once('value');
            if(snap.exists()) {
                const cloudData = snap.val();
                for(let key in cloudData) {
                    localStorage.setItem(key, JSON.stringify(cloudData[key]));
                }
            }
        }
    };

    /* =========================================
       3. MODÜLLER VE MANTIK
       ========================================= */
    
    // TAKVİM
    const Cal = {
        date: new Date(), selectedDate: null, emoji: '💖', events: {},
        init() { this.events = DB.get('zen_cal_v5') || {}; this.render(); },
        render() {
            const grid = document.getElementById('calGrid'); grid.innerHTML = '';
            const y = this.date.getFullYear(), m = this.date.getMonth();
            document.getElementById('calMonthTitle').innerText = new Intl.DateTimeFormat('tr-TR', {month:'long', year:'numeric'}).format(this.date);
            const daysInMonth = new Date(y, m+1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const key = `${y}-${m+1}-${i}`;
                const isToday = i === new Date().getDate() && m === new Date().getMonth();
                const div = document.createElement('div');
                div.className = `cal-day ${isToday?'today':''}`;
                let icons = '<div class="day-indicators">';
                if(this.events[key]) this.events[key].slice(0,2).forEach(ev => icons += `<span>${ev.emoji}</span>`);
                icons += '</div>';
                div.innerHTML = `<span>${i}</span>${icons}`;
                div.onclick = () => { this.selectedDate = key; document.getElementById('calModalTitle').innerText = key; this.renderNotes(); toggleModal('calModal'); };
                grid.appendChild(div);
            }
        },
        next() { this.date.setMonth(this.date.getMonth()+1); this.render(); },
        prev() { this.date.setMonth(this.date.getMonth()-1); this.render(); },
        selEmoji(e) { this.emoji = e; document.querySelectorAll('.emoji-btn').forEach(b => { b.classList.remove('active'); if(b.innerText===e) b.classList.add('active'); }); },
        addNote() {
            const val = document.getElementById('calNoteIn').value; if(!val) return;
            if(!this.events[this.selectedDate]) this.events[this.selectedDate] = [];
            this.events[this.selectedDate].push({ emoji: this.emoji, text: val, id: Date.now() });
            DB.set('zen_cal_v5', this.events); document.getElementById('calNoteIn').value = '';
            this.renderNotes(); this.render();
        },
        renderNotes() {
            const list = document.getElementById('calNoteList');
            list.innerHTML = (this.events[this.selectedDate] || []).map(n => `<li class="item"><span>${n.emoji} ${n.text}</span><span style="color:#ef4444;cursor:pointer" onclick="Cal.delNote(${n.id})">✕</span></li>`).join('');
        },
        delNote(id) { this.events[this.selectedDate] = this.events[this.selectedDate].filter(n => n.id !== id); DB.set('zen_cal_v5', this.events); this.renderNotes(); this.render(); }
    };

    // SU TAKİBİ
    const Water = {
        active: [],
        init() {
            this.active = DB.get('zen_water_v5') || [];
            if(localStorage.getItem('zen_water_date') !== new Date().toDateString()) { this.active = []; DB.set('zen_water_v5', []); }
            this.render();
        },
        toggle(i) {
            this.active.includes(i) ? this.active = this.active.filter(x=>x!==i) : this.active.push(i);
            DB.set('zen_water_v5', this.active); localStorage.setItem('zen_water_date', new Date().toDateString());
            this.render();
        },
        render() {
            const grid = document.getElementById('waterGrid'); grid.innerHTML = '';
            for(let i=0; i<10; i++){
                const g = document.createElement('div'); g.className = `glass ${this.active.includes(i)?'active':''}`;
                g.innerHTML = '<i data-lucide="droplet"></i>'; g.onclick = () => this.toggle(i);
                grid.appendChild(g);
            }
            document.getElementById('waterText').innerText = `${this.active.length * 200} / 2000 ml`; lucide.createIcons();
        }
    };

    // HABIT & YEMEK
    const Life = {
        days: ['Pzt','Sal','Çar','Per','Cum','Cts','Paz'],
        meals: {}, habits: [],
        init() {
            this.meals = DB.get('zen_meals_v3') || {};
            this.habits = DB.get('zen_habits_v3') || Array.from({length:10}, () => ({name:'', c:[]}));
            this.renderMeals(); this.renderHabits();
        },
        renderMeals() {
            const grid = document.getElementById('mealGrid'); grid.innerHTML = '';
            const slots = ['Sabah','Ara 1','Öğle','Ara 2','Akşam'];
            this.days.forEach(d => {
                let h = `<div class="meal-day"><h4>${d}</h4>`;
                slots.forEach((s, i) => h += `<span class="meal-label">${s}</span><input class="meal-input" value="${this.meals[d+i]||''}" onchange="Life.saveMeal('${d+i}', this.value)">`);
                grid.innerHTML += h + `</div>`;
            });
        },
        saveMeal(k, v) { this.meals[k] = v; DB.set('zen_meals_v3', this.meals); },
        renderHabits() {
            document.getElementById('habitHead').innerHTML = `<tr><th>Alışkanlık</th>${this.days.map(d=>`<th>${d}</th>`).join('')}</tr>`;
            const tbody = document.getElementById('habitGrid'); tbody.innerHTML = '';
            this.habits.forEach((h, r) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input class="meal-input" style="text-align:left" value="${h.name}" onchange="Life.saveHabitName(${r}, this.value)"></td>`;
                for(let c=0; c<7; c++) {
                    const active = h.c.includes(c) ? 'checked' : '';
                    tr.innerHTML += `<td><div class="check-box ${active}" onclick="Life.toggleHabit(${r}, ${c})"></div></td>`;
                }
                tbody.appendChild(tr);
            });
        },
        saveHabitName(r, v) { this.habits[r].name = v; DB.set('zen_habits_v3', this.habits); },
        toggleHabit(r, c) {
            const h = this.habits[r];
            h.c.includes(c) ? h.c = h.c.filter(x=>x!==c) : h.c.push(c);
            DB.set('zen_habits_v3', this.habits); this.renderHabits();
        }
    };

    // FOCUS
    const Focus = {
        timer: null, timeLeft: 25*60,
        init() { document.getElementById('timerCtrl').onclick = () => this.toggle(); },
        toggle() { this.timer ? this.stop() : this.start(); },
        start() {
            this.timeLeft = document.getElementById('timerMin').value * 60; document.getElementById('timerCtrl').innerText = 'Durdur';
            this.timer = setInterval(() => { this.timeLeft--; this.updateUI(); if(this.timeLeft<=0){ this.stop(); alert('Focus Bitti! ✨'); } }, 1000);
        },
        stop() { clearInterval(this.timer); this.timer = null; document.getElementById('timerCtrl').innerText = 'Başlat'; },
        reset() { this.stop(); this.timeLeft = document.getElementById('timerMin').value * 60; this.updateUI(); },
        updateUI() { const m = Math.floor(this.timeLeft/60), s = this.timeLeft%60; document.getElementById('timerDisp').innerText = `${m}:${s.toString().padStart(2,'0')}`; }
    };

    // LİSTELER
    const Lists = {
        todo: [], budget: [],
        init() { this.todo = DB.get('zen_todo_v4') || []; this.budget = DB.get('zen_budget_v4') || []; this.render('todo'); this.render('budget'); },
        add(type) { const v = document.getElementById(type+'In').value; if(!v)return; this[type].push(v); DB.set('zen_'+type+'_v4', this[type]); document.getElementById(type+'In').value=''; this.render(type); },
        render(type) {
            const list = document.getElementById(type+'List'); let total = 0;
            list.innerHTML = this[type].map((t, i) => { if(type==='budget'){ const m = t.match(/\d+/); if(m) total+=parseInt(m[0]); } return `<li class="item"><span>${t}</span><span style="color:#ef4444;cursor:pointer" onclick="Lists.del('${type}',${i})">✕</span></li>`; }).join('');
            if(type==='budget') document.getElementById('budgetTotal').innerText = total;
        },
        del(type, i) { this[type].splice(i,1); DB.set('zen_'+type+'_v4', this[type]); this.render(type); }
    };

    // YARDIMCI FONKSİYONLAR
    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
    function toggleTheme() { const b = document.body; b.getAttribute('data-theme')==='zen' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme','zen'); }
    
    function saveProfile() { 
        const newName = document.getElementById('userNameIn').value;
        if(newName && currentUid) {
            db.ref('users/' + currentUid + '/fullName').set(newName).then(() => {
                document.getElementById('userNameDisp').innerText = newName;
                toggleModal('settingsModal');
            });
        }
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf; const pdf = new jsPDF('l', 'mm', 'a3');
        const captureArea = document.getElementById('captureArea');
        html2canvas(captureArea, { scale: 1.5, backgroundColor: '#020617' }).then(canvas => { 
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 420, 297); 
            pdf.save('ZenOS_Dashboard.pdf'); 
        });
    }

    // AUTH GUARD İZİN VERDİĞİNDE BURASI ÇALIŞIR
    function startApp() {
        const q = ["Gülümse, bugün senin günün. 🌸", "Odaklandığın her şey güzelleşir. ✨", "Zihnin sakin, ruhun özgür olsun.", "Küçük adımlar, büyük hayaller."];
        document.getElementById('quoteBox').innerText = `"${q[Math.floor(Math.random()*q.length)]}"`;
        Cal.init(); Water.init(); Life.init(); Focus.init(); Lists.init();
    }
</script>
</body>
</html>
