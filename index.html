<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen OS | Pro Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="container">
    <header class="top-bar">
        <h1>ZEN OS <span class="badge">PRO</span></h1>
        <button id="themeToggle" class="btn-outline"><i data-lucide="moon"></i> Tema Değiştir</button>
    </header>

    <main class="grid-layout">
        <section class="panel mod-quote" style="grid-column: span 2;">
            <h2><i data-lucide="quote"></i> Günün Sözü</h2>
            <div style="display: flex; align-items: center; justify-content: center; height: 100%;">
                <p id="quoteText" class="quote-text">Yükleniyor...</p>
            </div>
        </section>

        <section class="panel mod-water" style="grid-column: span 2;">
            <h2><i data-lucide="droplet"></i> Su Takibi</h2>
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;">
                <div class="water-status">
                    <span id="waterTotalText">0</span><small style="font-size: 1rem; opacity: 0.7;"> / 2000 ml</small>
                </div>
                <div id="waterGrid" class="water-grid" style="width: 100%; max-width: 450px;"></div>
                <div class="info-text">Gece 00:00'da sıfırlanır.</div>
            </div>
        </section>

        <section class="panel mod-focus">
            <h2><i data-lucide="zap"></i> Deep Work</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <button id="timerBtn" class="btn-primary w-100">Başlat</button>
        </section>

        <section class="panel mod-calendar">
            <h2><i data-lucide="calendar"></i> Takvim</h2>
            <h3 id="calMonth" class="cal-month"></h3>
            <div id="calGrid" class="calendar-grid"></div>
        </section>

        <section class="panel mod-todo">
            <h2><i data-lucide="check-square"></i> Yapılacaklar</h2>
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Yeni görev...">
                <button id="todoAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="todoList" class="item-list"></ul>
        </section>

        <section class="panel mod-meal">
            <h2><i data-lucide="utensils"></i> Yemek Planı</h2>
            <select id="mealDaySelect" class="input-field mb-2">
                <option value="Pzt">Pazartesi</option><option value="Sal">Salı</option>
                <option value="Çar">Çarşamba</option><option value="Per">Perşembe</option>
                <option value="Cum">Cuma</option><option value="Cts">Cumartesi</option>
                <option value="Paz">Pazar</option>
            </select>
            <div class="input-group">
                <input type="text" id="mealInput" placeholder="Yemek adı...">
                <button id="mealAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="mealList" class="item-list"></ul>
        </section>

        <section class="panel mod-habit">
            <h2><i data-lucide="activity"></i> Alışkanlıklar</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Kitap oku...">
                <button id="habitAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="habitList" class="item-list"></ul>
        </section>

        <section class="panel mod-budget">
            <h2><i data-lucide="wallet"></i> Bütçe Takibi</h2>
            <div class="input-group mb-2">
                <input type="text" id="budgetInput" placeholder="Kira: 15000">
                <button id="budgetAddBtn" class="btn-primary">+</button>
            </div>
            <div class="budget-total">Toplam Gider: <span id="budgetTotalText">0</span> TL</div>
            <ul id="budgetList" class="item-list"></ul>
        </section>
    </main>
</div>

<script type="module" src="app.js"></script>
    <div id="calendarModal" class="modal-overlay hidden">
    <div class="modal-content panel">
        <div class="modal-header">
            <h3 id="modalDateTitle">Tarih</h3>
            <button id="closeModalBtn" class="btn-outline" style="padding: 5px 10px; border: none; color: red;">✕</button>
        </div>
        <div class="modal-body">
            <div class="icon-selector" id="iconSelector">
                <button class="icon-btn active" data-icon="briefcase" title="İş/Toplantı"><i data-lucide="briefcase"></i></button>
                <button class="icon-btn" data-icon="heart" title="Özel/Aile"><i data-lucide="heart"></i></button>
                <button class="icon-btn" data-icon="shopping-cart" title="Alışveriş"><i data-lucide="shopping-cart"></i></button>
                <button class="icon-btn" data-icon="dumbbell" title="Spor/Aktivite"><i data-lucide="dumbbell"></i></button>
                <button class="icon-btn" data-icon="book" title="Eğitim/Okuma"><i data-lucide="book"></i></button>
                <button class="icon-btn" data-icon="alert-circle" title="Önemli"><i data-lucide="alert-circle"></i></button>
                <button class="icon-btn" data-icon="coffee" title="Mola/Buluşma"><i data-lucide="coffee"></i></button>
            </div>
            
            <div class="input-group mb-2">
                <input type="text" id="calNoteInput" placeholder="Bugün için planın ne şef?">
                <button id="saveCalNoteBtn" class="btn-primary">Ekle</button>
            </div>
            
            <ul id="dayNotesList" class="item-list"></ul>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
</body>
</html>
