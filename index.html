<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen OS | Pro Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="container">
    <header class="top-bar">
        <h1>ZEN OS <span class="badge">PRO</span></h1>
        <button id="themeToggle" class="btn-outline"><i data-lucide="moon"></i> Tema Değiştir</button>
    </header>

    <main class="grid-layout">
        <section class="panel mod-quote" style="grid-column: 1 / -1;">
            <h2><i data-lucide="quote"></i> Günün Sözü</h2>
            <p id="quoteText" class="quote-text">Yükleniyor...</p>
        </section>

        <section class="panel mod-water">
            <h2><i data-lucide="droplet"></i> Su Takibi</h2>
            <div class="water-status">
                <span id="waterTotalText">0</span><small> / 2000 ml</small>
            </div>
            <div id="waterGrid" class="water-grid"></div>
            <div class="info-text">Gece 00:00'da sıfırlanır.</div>
        </section>

        <section class="panel mod-focus">
            <h2><i data-lucide="zap"></i> Deep Work</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <button id="timerBtn" class="btn-primary w-100">Başlat</button>
        </section>

        <section class="panel mod-calendar">
            <h2><i data-lucide="calendar"></i> Takvim</h2>
            <h3 id="calMonth" class="cal-month"></h3>
            <div id="calGrid" class="calendar-grid"></div>
        </section>

        <section class="panel mod-todo">
            <h2><i data-lucide="check-square"></i> Yapılacaklar</h2>
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="Yeni görev...">
                <button id="todoAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="todoList" class="item-list"></ul>
        </section>

        <section class="panel mod-meal">
            <h2><i data-lucide="utensils"></i> Yemek Planı</h2>
            <select id="mealDaySelect" class="input-field mb-2">
                <option value="Pzt">Pazartesi</option><option value="Sal">Salı</option>
                <option value="Çar">Çarşamba</option><option value="Per">Perşembe</option>
                <option value="Cum">Cuma</option><option value="Cts">Cumartesi</option>
                <option value="Paz">Pazar</option>
            </select>
            <div class="input-group">
                <input type="text" id="mealInput" placeholder="Yemek adı...">
                <button id="mealAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="mealList" class="item-list"></ul>
        </section>

        <section class="panel mod-habit">
            <h2><i data-lucide="activity"></i> Alışkanlıklar</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Kitap oku...">
                <button id="habitAddBtn" class="btn-primary">+</button>
            </div>
            <ul id="habitList" class="item-list"></ul>
        </section>

        <section class="panel mod-budget">
            <h2><i data-lucide="wallet"></i> Bütçe Takibi</h2>
            <div class="input-group mb-2">
                <input type="text" id="budgetInput" placeholder="Kira: 15000">
                <button id="budgetAddBtn" class="btn-primary">+</button>
            </div>
            <div class="budget-total">Toplam Gider: <span id="budgetTotalText">0</span> TL</div>
            <ul id="budgetList" class="item-list"></ul>
        </section>
    </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
