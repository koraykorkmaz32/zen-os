<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen OS | Command Center</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'ZenOS','short_name':'ZenOS','start_url':'.','display':'standalone','background_color':'#020617','theme_color':'#38bdf8'}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* --- 1. TASARIM VE DEĞİŞKENLER --- */
        :root {
            --bg: #020617; --panel: rgba(15, 23, 42, 0.85);
            --accent: #38bdf8; --text: #f8fafc; --border: rgba(255, 255, 255, 0.1);
        }
        [data-theme="zen"] {
            --bg: #f8fafc; --panel: rgba(255, 255, 255, 0.98);
            --accent: #10b981; --text: #1e293b; --border: rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: 0.4s; min-height: 100vh; padding: 15px; }
        
        /* Güvenlik: Kopyalamayı zorlaştır */
        body { user-select: none; -webkit-user-select: none; }

        .container { max-width: 1700px; margin: 0 auto; }
        
        /* GRID MİMARİSİ */
        .grid-layout { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .panel { background: var(--panel); backdrop-filter: blur(15px); border-radius: 28px; padding: 22px; border: 1px solid var(--border); overflow: hidden; height: 100%; display: flex; flex-direction: column; }
        h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: 700; }

        /* Üst Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px 30px; background: var(--panel); border-radius: 20px; border: 1px solid var(--border); }
        .welcome-text { font-size: 1.1rem; font-weight: 700; }

        /* SU TAKİBİ (DEV BARDAKLAR) */
        .water-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; width: 100%; margin-top: 5px; }
        .glass { 
            aspect-ratio: 1/1.5; border: 3px solid var(--accent); border-radius: 6px 6px 18px 18px; 
            cursor: pointer; transition: 0.3s; background: rgba(56, 189, 248, 0.05); 
            display: flex; align-items: center; justify-content: center; min-height: 70px;
        }
        .glass.active { background: var(--accent); box-shadow: 0 0 25px var(--accent); transform: scale(0.92); }
        .glass svg { width: 24px; height: 24px; color: var(--accent); }
        .glass.active svg { color: var(--bg); }

        /* TAKVİM ÜST SEVİYE */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; flex: 1; }
        .cal-day { aspect-ratio: 1/1; background: rgba(255,255,255,0.03); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .cal-day:hover { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .cal-day.today { border: 2px solid var(--accent); color: var(--accent); font-weight: 800; }
        .day-indicators { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }

        /* 5 ÖĞÜNLÜK YEMEK PLANI */
        .meal-table { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; }
        .meal-day { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; border: 1px solid var(--border); }
        .meal-day h4 { font-size: 0.8rem; color: var(--accent); text-align: center; margin-bottom: 10px; }
        .meal-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.7rem; padding: 6px; margin-bottom: 4px; }
        .meal-label { font-size: 0.55rem; opacity: 0.4; display: block; }

        /* HABIT TRACKER */
        .habit-table { width: 100%; border-collapse: collapse; }
        .check-box { width: 22px; height: 22px; border: 2px solid var(--accent); border-radius: 6px; cursor: pointer; margin: 0 auto; transition: 0.2s; }
        .check-box.checked { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* UI ELEMANLARI */
        .btn-primary { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 0.8rem; }
        .input-field { background: rgba(0,0,0,0.25); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 10px; width: 100%; }
        .item-list { list-style: none; overflow-y: auto; flex: 1; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 5px; font-size: 0.8rem; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .hidden { display: none !important; }

        /* MOBİL ADAPTASYON */
        @media (max-width: 1200px) { .grid-layout { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .grid-layout { grid-template-columns: 1fr; } .meal-table { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="container" id="captureArea">
    <header class="top-bar">
        <div class="welcome-text">Hoş geldin, <span id="userNameDisp">Şef</span></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-primary" onclick="toggleTheme()" id="themeIco"><i data-lucide="sun"></i></button>
            <button class="btn-primary" onclick="toggleModal('settingsModal')"><i data-lucide="settings"></i></button>
            <button class="btn-primary" onclick="exportPDF()">PDF İndir</button>
        </div>
    </header>

    <main class="grid-layout">
        <section class="panel" style="grid-column: span 1;">
            <h2><i data-lucide="quote"></i> Motivasyon</h2>
            <div style="flex:1; display:flex; align-items:center; justify-content:center;">
                <p id="quoteBox" style="font-style:italic; text-align:center; font-size: 1.1rem; line-height: 1.4;"></p>
            </div>
        </section>

        <section class="panel" style="grid-column: span 1;">
            <h2><i data-lucide="zap"></i> Deep Focus</h2>
            <div style="text-align: center; flex:1; display:flex; flex-direction:column; justify-content:center;">
                <div id="timerDisp" style="font-size: 3rem; font-weight: 800; margin-bottom: 10px;">25:00</div>
                <div style="display: flex; gap: 5px;">
                    <input type="number" id="timerMin" value="25" class="input-field" style="text-align:center">
                    <button class="btn-primary" id="timerCtrl">Başlat</button>
                </div>
            </div>
        </section>

        <section class="panel" style="grid-column: span 2;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i data-lucide="droplet"></i> Su Takibi (10 Bardak)</h2>
                <span id="waterText" style="font-size: 1.4rem; font-weight: 800; color: var(--accent);">0 / 2000 ml</span>
            </div>
            <div class="water-grid" id="waterGrid"></div>
        </section>

        <section class="panel" style="grid-column: span 2;">
            <div class="cal-nav">
                <h2><i data-lucide="calendar"></i> Takvim Planlayıcı</h2>
                <div>
                    <button onclick="Cal.prev()" class="btn-primary" style="padding:5px 10px"> < </button>
                    <span id="calMonthTitle" style="margin: 0 10px; font-weight:700; font-size:0.9rem">Mart 2026</span>
                    <button onclick="Cal.next()" class="btn-primary" style="padding:5px 10px"> > </button>
                </div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </section>

        <section class="panel">
            <h2><i data-lucide="check-square"></i> Yapılacaklar</h2>
            <div style="display:flex; gap:5px; margin-bottom:10px">
                <input id="todoIn" class="input-field" placeholder="Görev...">
                <button class="btn-primary" onclick="Lists.add('todo')">+</button>
            </div>
            <ul id="todoList" class="item-list"></ul>
        </section>

        <section class="panel">
            <h2><i data-lucide="wallet"></i> Bütçe Takibi</h2>
            <div style="display:flex; gap:5px; margin-bottom:10px">
                <input id="budgetIn" class="input-field" placeholder="Harcama: 500">
                <button class="btn-primary" onclick="Lists.add('budget')">+</button>
            </div>
            <div style="text-align:right; font-weight:800; color:var(--accent); font-size:1rem; margin-bottom:5px">Total: <span id="budgetTotal">0</span> TL</div>
            <ul id="budgetList" class="item-list"></ul>
        </section>

        <section class="panel" style="grid-column: span 4;" id="mealExport">
            <h2><i data-lucide="utensils"></i> 5 Öğünlü Haftalık Yemek Planı</h2>
            <div class="meal-table" id="mealGrid"></div>
        </section>

        <section class="panel" style="grid-column: span 4;" id="habitExport">
            <h2><i data-lucide="activity"></i> Haftalık Alışkanlık Takibi (10 Satır)</h2>
            <table class="habit-table">
                <thead id="habitHead"></thead>
                <tbody id="habitGrid"></tbody>
            </table>
        </section>
    </main>
</div>

<div id="settingsModal" class="modal hidden">
    <div class="panel" style="width: 320px;">
        <h2>Ayarlar</h2>
        <input id="userNameIn" class="input-field" placeholder="İsminizi yazın...">
        <button class="btn-primary" onclick="saveProfile()" style="width:100%; margin-top:10px">Kaydet</button>
        <button class="btn-primary" onclick="toggleModal('settingsModal')" style="width:100%; margin-top:5px; background:transparent; border:1px solid var(--border); color:var(--text)">Kapat</button>
    </div>
</div>

<div id="calModal" class="modal hidden">
    <div class="panel" style="width: 400px; max-height:80vh">
        <h2 id="calModalTitle">Tarih</h2>
        <div style="display:flex; gap:5px; margin-bottom:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:15px; justify-content:center">
            <button class="emoji-btn" onclick="Cal.selEmoji('heart')">❤️</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('briefcase')">💼</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('dumbbell')">💪</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('shopping-cart')">🛒</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('book')">📚</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('coffee')">☕</button>
            <button class="emoji-btn" onclick="Cal.selEmoji('alert-circle')">⚠️</button>
        </div>
        <div style="display:flex; gap:5px; margin-bottom:10px">
            <input id="calNoteIn" class="input-field" placeholder="Not ekle...">
            <button class="btn-primary" onclick="Cal.addNote()">Ekle</button>
        </div>
        <ul id="calNoteList" class="item-list"></ul>
        <button class="btn-primary" onclick="toggleModal('calModal')" style="width:100%; margin-top:10px">Kapat</button>
    </div>
</div>

<script>
    /* --- 3. MOTOR VE MANTIK --- */
    lucide.createIcons();
    
    const DB = {
        get: (k) => JSON.parse(localStorage.getItem(k)),
        set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
    };

    // TAKVİM SİSTEMİ
    const Cal = {
        date: new Date(),
        selectedDate: null,
        emoji: 'heart',
        events: DB.get('zen_cal_v3') || {},

        init() {
            this.render();
        },
        render() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const y = this.date.getFullYear(), m = this.date.getMonth();
            document.getElementById('calMonthTitle').innerText = new Intl.DateTimeFormat('tr-TR', {month:'long', year:'numeric'}).format(this.date);
            
            const daysInMonth = new Date(y, m+1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const dateKey = `${y}-${m+1}-${i}`;
                const isToday = i === new Date().getDate() && m === new Date().getMonth();
                const div = document.createElement('div');
                div.className = `cal-day ${isToday?'today':''}`;
                
                let icons = '<div class="day-indicators">';
                if(this.events[dateKey]) {
                    this.events[dateKey].slice(0,3).forEach(ev => icons += `<i data-lucide="${ev.icon}" style="width:10px;height:10px"></i>`);
                }
                icons += '</div>';

                div.innerHTML = `<span>${i}</span>${icons}`;
                div.onclick = () => this.open(dateKey);
                grid.appendChild(div);
            }
            lucide.createIcons();
        },
        next() { this.date.setMonth(this.date.getMonth()+1); this.render(); },
        prev() { this.date.setMonth(this.date.getMonth()-1); this.render(); },
        open(key) {
            this.selectedDate = key;
            document.getElementById('calModalTitle').innerText = key;
            this.renderNotes();
            toggleModal('calModal');
        },
        selEmoji(e) { this.emoji = e; },
        addNote() {
            const val = document.getElementById('calNoteIn').value;
            if(!val) return;
            if(!this.events[this.selectedDate]) this.events[this.selectedDate] = [];
            this.events[this.selectedDate].push({ icon: this.emoji, text: val, id: Date.now() });
            DB.set('zen_cal_v3', this.events);
            document.getElementById('calNoteIn').value = '';
            this.renderNotes();
            this.render();
        },
        renderNotes() {
            const list = document.getElementById('calNoteList');
            list.innerHTML = (this.events[this.selectedDate] || []).map(n => `
                <li class="item">
                    <span><i data-lucide="${n.icon}" style="width:14px; vertical-align:middle"></i> ${n.text}</span>
                    <span style="color:red; cursor:pointer" onclick="Cal.delNote(${n.id})">✕</span>
                </li>
            `).join('');
            lucide.createIcons();
        },
        delNote(id) {
            this.events[this.selectedDate] = this.events[this.selectedDate].filter(n => n.id !== id);
            DB.set('zen_cal_v3', this.events);
            this.renderNotes();
            this.render();
        }
    };

    // SU TAKİBİ
    const Water = {
        active: DB.get('zen_water_v3') || [],
        init() {
            if(localStorage.getItem('zen_water_date') !== new Date().toDateString()) {
                this.active = []; DB.set('zen_water_v3', []);
            }
            this.render();
        },
        toggle(i) {
            this.active.includes(i) ? this.active = this.active.filter(x=>x!==i) : this.active.push(i);
            DB.set('zen_water_v3', this.active);
            localStorage.setItem('zen_water_date', new Date().toDateString());
            this.render();
        },
        render() {
            const grid = document.getElementById('waterGrid');
            grid.innerHTML = '';
            for(let i=0; i<10; i++){
                const g = document.createElement('div');
                g.className = `glass ${this.active.includes(i)?'active':''}`;
                g.innerHTML = '<i data-lucide="droplet"></i>';
                g.onclick = () => this.toggle(i);
                grid.appendChild(g);
            }
            document.getElementById('waterText').innerText = `${this.active.length * 200} / 2000 ml`;
            lucide.createIcons();
        }
    };

    // YEMEK VE HABIT (5 ÖĞÜN VE 10 SATIR)
    const Life = {
        days: ['Pzt','Sal','Çar','Per','Cum','Cts','Paz'],
        meals: DB.get('zen_meals_v3') || {},
        habits: DB.get('zen_habits_v3') || Array.from({length:10}, () => ({name:'', c:[]})),
        
        init() {
            this.renderMeals();
            this.renderHabits();
        },
        renderMeals() {
            const grid = document.getElementById('mealGrid');
            const slots = ['Sabah','Ara 1','Öğle','Ara 2','Akşam'];
            this.days.forEach(d => {
                let html = `<div class="meal-day"><h4>${d}</h4>`;
                slots.forEach((s, i) => {
                    html += `<span class="meal-label">${s}</span><input class="meal-input" value="${this.meals[d+i]||''}" onchange="Life.saveMeal('${d+i}', this.value)">`;
                });
                grid.innerHTML += html + `</div>`;
            });
        },
        saveMeal(k, v) { this.meals[k] = v; DB.set('zen_meals_v3', this.meals); },
        renderHabits() {
            const head = document.getElementById('habitHead');
            const body = document.getElementById('habitGrid');
            head.innerHTML = `<tr><th>Alışkanlık</th>${this.days.map(d=>`<th>${d}</th>`).join('')}</tr>`;
            this.habits.forEach((h, r) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input class="meal-input" style="text-align:left" value="${h.name}" onchange="Life.saveHabit(${r}, this.value)"></td>`;
                for(let c=0; c<7; c++) tr.innerHTML += `<td><div class="check-box ${h.c.includes(c)?'checked':''}" onclick="Life.toggleHabit(${r},${c})"></div></td>`;
                body.appendChild(tr);
            });
        },
        saveHabit(r, v) { this.habits[r].name = v; DB.set('zen_habits_v3', this.habits); },
        toggleHabit(r, c) {
            const h = this.habits[r];
            h.c.includes(c) ? h.c = h.c.filter(x=>x!==c) : h.c.push(c);
            DB.set('zen_habits_v3', this.habits);
            location.reload();
        }
    };

    // DİĞER FONKSİYONLAR
    const Lists = {
        todo: DB.get('zen_todo_v3') || [],
        budget: DB.get('zen_budget_v3') || [],
        add(type) {
            const val = document.getElementById(type+'In').value;
            if(!val) return;
            this[type].push(val);
            DB.set('zen_'+type+'_v3', this[type]);
            document.getElementById(type+'In').value = '';
            this.render(type);
        },
        render(type) {
            const list = document.getElementById(type+'List');
            let total = 0;
            list.innerHTML = this[type].map((t, i) => {
                if(type==='budget') { const m = t.match(/\d+/); if(m) total += parseInt(m[0]); }
                return `<li class="item"><span>${t}</span><span style="color:red; cursor:pointer" onclick="Lists.del('${type}',${i})">✕</span></li>`;
            }).join('');
            if(type==='budget') document.getElementById('budgetTotal').innerText = total;
        },
        del(type, i) { this[type].splice(i,1); DB.set('zen_'+type+'_v3', this[type]); this.render(type); }
    };

    let timer;
    document.getElementById('timerCtrl').onclick = () => {
        if(timer) { clearInterval(timer); timer=null; document.getElementById('timerCtrl').innerText='Başlat'; return; }
        let sec = document.getElementById('timerMin').value * 60;
        document.getElementById('timerCtrl').innerText='Durdur';
        timer = setInterval(() => {
            sec--;
            document.getElementById('timerDisp').innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
            if(sec<=0) { clearInterval(timer); alert('Seans bitti!'); }
        }, 1000);
    };

    async function exportPDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('l', 'mm', 'a3');
        html2canvas(document.getElementById('captureArea'), { scale: 1.5, backgroundColor: '#020617' }).then(canvas => {
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 420, 297);
            pdf.save('ZenOS_Dashboard.pdf');
        });
    }

    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
    function toggleTheme() {
        const b = document.body;
        b.getAttribute('data-theme')==='zen' ? b.removeAttribute('data-theme') : b.setAttribute('data-theme','zen');
    }
    function saveProfile() {
        localStorage.setItem('zen_name', document.getElementById('userNameIn').value);
        location.reload();
    }

    // BAŞLAT
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('userNameDisp').innerText = localStorage.getItem('zen_name') || 'Şef';
        const q = ["Odaklandığın şey büyür.", "Zihnin sakini, hayatın hâkimi olur.", "Başarı disiplinle gelir.", "Bugün yarınki seni yaratır."];
        document.getElementById('quoteBox').innerText = `"${q[Math.floor(Math.random()*q.length)]}"`;
        Cal.init(); Water.init(); Life.init(); Lists.render('todo'); Lists.render('budget');
    });
</script>
</body>
</html>
