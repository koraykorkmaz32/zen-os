<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SyncMy.Life</title>
    <style>
        /* --- ELEGANT & FEMININE CSS VARIABLES --- */
        :root {
            --bg-gradient: radial-gradient(circle at top left, #2d1b2e 0%, #1a0f1c 50%, #0f0710 100%);
            --glass-bg: rgba(35, 20, 32, 0.55);
            --glass-border: rgba(255, 180, 162, 0.15);
            --primary-accent: #ffb4a2;
            --primary-gradient: linear-gradient(135deg, #e5989b 0%, #ffb4a2 100%);
            --text-main: #fdfbf7;
            --text-muted: #b5a3b0;
            --input-bg: rgba(20, 10, 18, 0.6);
            --warning-bg: rgba(229, 152, 155, 0.1);
            --warning-border: rgba(229, 152, 155, 0.4);
            --warning-text: #ffb4a2;
            --success-color: #a3b18a;
            --error-color: #d53636;
        }

        /* --- GLOBAL RESET & BODY --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- BACKGROUND SOFT GLOW EFFECTS --- */
        .glow-circle {
            position: absolute;
            width: 350px;
            height: 350px;
            background: rgba(229, 152, 155, 0.12);
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            top: -50px;
            left: -50px;
        }

        .glow-circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 180, 162, 0.1);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            bottom: -50px;
            right: -50px;
        }

        /* --- TWO-COLUMN GLASSMORPHISM CARD --- */
        .contact-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 850px; /* Genişletildi */
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            overflow: hidden;
        }

        /* Left Panel - Logo & Branding */
        .left-panel {
            flex: 0 0 40%;
            background: linear-gradient(135deg, rgba(229, 152, 155, 0.1) 0%, rgba(0,0,0,0) 100%);
            border-right: 1px solid var(--glass-border);
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: url(#grad1);
            filter: drop-shadow(0 10px 15px rgba(229, 152, 155, 0.3));
        }

        .brand-name {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .brand-tagline {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.6;
        }

        /* Right Panel - Form */
        .right-panel {
            flex: 1;
            padding: 50px 45px;
            position: relative;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TOP BAR (LANG TOGGLE) --- */
        .top-bar {
            position: absolute;
            top: 30px;
            right: 45px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .lang-btn:hover {
            color: var(--text-main);
            border-color: var(--primary-accent);
            background: rgba(255, 180, 162, 0.1);
        }

        /* --- HEADER --- */
        .header {
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h2 {
            font-size: 30px;
            font-weight: 600;
            margin-bottom: 8px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* --- IMPORTANT WARNING BOX --- */
        .email-warning {
            background: var(--warning-bg);
            border-left: 3px solid var(--warning-border);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 12px;
            color: var(--warning-text);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            line-height: 1.6;
            font-weight: 400;
        }

        .email-warning svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            fill: currentColor;
            margin-top: 1px;
        }

        /* --- FORMS --- */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-accent);
            background: rgba(20, 10, 18, 0.8);
            box-shadow: 0 0 0 3px rgba(229, 152, 155, 0.15);
        }

        .form-control::placeholder {
            color: #6a5d66;
            font-weight: 300;
        }

        /* --- SUBMIT BUTTON --- */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: var(--primary-gradient);
            color: #2a1b2e; /* Koyu metin daha şık durur */
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(229, 152, 155, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(229, 152, 155, 0.35);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(42, 27, 46, 0.3);
            border-radius: 50%;
            border-top-color: #2a1b2e;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- STATUS MESSAGES --- */
        .status-box {
            display: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            animation: floatIn 0.3s ease;
        }

        .status-box.success {
            background: rgba(163, 177, 138, 0.15);
            color: var(--success-color);
            border: 1px solid rgba(163, 177, 138, 0.3);
        }

        .status-box.error {
            background: rgba(213, 54, 54, 0.15);
            color: var(--error-color);
            border: 1px solid rgba(213, 54, 54, 0.3);
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 30px;
            text-align: center;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .footer a:hover {
            color: var(--primary-accent);
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .glass-card {
                flex-direction: column;
            }
            .left-panel {
                padding: 40px 20px;
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .right-panel {
                padding: 40px 25px;
            }
            .top-bar {
                top: 20px;
                right: 25px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Ambience -->
    <div class="glow-circle"></div>
    <div class="glow-circle-2"></div>

    <main class="contact-wrapper">
        <div class="glass-card">
            
            <!-- LEFT PANEL: LOGO & BRAND -->
            <aside class="left-panel">
                <!-- SVG Definition for Gradient -->
                <svg width="0" height="0">
                  <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#e5989b;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ffb4a2;stop-opacity:1" />
                  </linearGradient>
                </svg>
                <!-- Elegant Abstract Logo (Lotus/Sparkle vibe) -->
                <svg class="brand-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C12 2 12 9.5 17.5 12C12 14.5 12 22 12 22C12 22 12 14.5 6.5 12C12 9.5 12 2 12 2Z"/>
                </svg>
                <h1 class="brand-name">SyncMy.Life</h1>
                <p class="brand-tagline" data-i18n="tagline">Empowering your daily flow with elegance.</p>
            </aside>

            <!-- RIGHT PANEL: FORM -->
            <section class="right-panel">
                <div class="top-bar">
                    <button class="lang-btn" id="langToggle">TR / EN</button>
                </div>

                <header class="header">
                    <h2 data-i18n="title">Get in Touch</h2>
                    <p data-i18n="subtitle">We'd love to hear your thoughts and ideas.</p>
                </header>

                <form id="contactForm" action="https://formspree.io/f/xqegjllr" method="POST">
                    
                    <div class="email-warning">
                        <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22M12 6l7.53 13H4.47M11 10v4h2v-4m-2 6v2h2v-2"></path></svg>
                        <span data-i18n="warningText">Please double-check your email address. We will reach back to you here!</span>
                    </div>

                    <div class="form-group">
                        <label for="name" data-i18n="nameLabel">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" data-i18n-placeholder="namePlaceholder" placeholder="e.g. Jane Austen" required autocomplete="name">
                    </div>

                    <div class="form-group">
                        <label for="email" data-i18n="emailLabel">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" data-i18n-placeholder="emailPlaceholder" placeholder="jane@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="message" data-i18n="messageLabel">Your Message</label>
                        <textarea id="message" name="message" class="form-control" data-i18n-placeholder="messagePlaceholder" placeholder="How can we assist you today?" required></textarea>
                    </div>

                    <label style="display: none !important;">
                        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
                    </label>

                    <div id="statusBox" class="status-box"></div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span id="btnText" data-i18n="btnText">Send Message</span>
                        <span class="spinner" id="spinner"></span>
                    </button>
                </form>

                <footer class="footer">
                    <a href="http://syncmy.life">
                        <span data-i18n="backHome">← Back to Home</span>
                    </a>
                </footer>
            </section>

        </div>
    </main>

    <script>
        const i18n = {
            en: {
                tagline: "Empowering your daily flow with elegance.",
                title: "Get in Touch",
                subtitle: "We'd love to hear your thoughts and ideas.",
                warningText: "Please double-check your email address. We will reach back to you here!",
                nameLabel: "Full Name",
                namePlaceholder: "e.g. Jane Austen",
                emailLabel: "Email Address",
                emailPlaceholder: "jane@example.com",
                messageLabel: "Your Message",
                messagePlaceholder: "How can we assist you today?",
                btnText: "Send Message",
                backHome: "← Back to Home",
                successMsg: "Message sent beautifully! Redirecting...",
                errorMsg: "Oops! Something went wrong.",
                networkError: "Network error. Please try again later."
            },
            tr: {
                tagline: "Günlük akışınızı zarafetle güçlendirin.",
                title: "Bize Ulaşın",
                subtitle: "Düşüncelerinizi ve fikirlerinizi duymayı çok isteriz.",
                warningText: "Lütfen e-posta adresinizin doğruluğundan emin olun. Size bu adres üzerinden dönüş yapacağız!",
                nameLabel: "Ad Soyad",
                namePlaceholder: "Örn. Ayşe Yılmaz",
                emailLabel: "E-posta Adresi",
                emailPlaceholder: "ayse@ornek.com",
                messageLabel: "Mesajınız",
                messagePlaceholder: "Size bugün nasıl yardımcı olabiliriz?",
                btnText: "Mesajı Gönder",
                backHome: "← Ana Sayfaya Dön",
                successMsg: "Mesajınız harika bir şekilde iletildi! Yönlendiriliyorsunuz...",
                errorMsg: "Hata! Bir şeyler ters gitti.",
                networkError: "Bağlantı hatası. Lütfen daha sonra tekrar deneyin."
            }
        };

        let currentLang = 'en';

        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.toLowerCase().includes('tr')) {
                currentLang = 'tr';
            } else {
                currentLang = 'en';
            }
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.innerHTML = i18n[currentLang][key];
                }
            });

            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[currentLang][key]) {
                    el.placeholder = i18n[currentLang][key];
                }
            });

            document.getElementById('langToggle').innerText = currentLang === 'en' ? 'TÜRKÇE' : 'ENGLISH';
            document.documentElement.lang = currentLang;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            updateUI();
        });

        const form = document.getElementById("contactForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");
        const statusBox = document.getElementById("statusBox");

        const showStatus = (messageKey, type) => {
            statusBox.innerHTML = i18n[currentLang][messageKey] || messageKey;
            statusBox.className = `status-box ${type}`;
            statusBox.style.display = "block";
        };

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            
            submitBtn.disabled = true;
            btnText.style.display = "none";
            spinner.style.display = "block";
            statusBox.style.display = "none";
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    showStatus('successMsg', 'success');
                    form.reset();
                    setTimeout(() => {
                        window.location.href = "http://syncmy.life";
                    }, 1800);
                } else {
                    showStatus('errorMsg', 'error');
                    resetBtnState();
                }
            } catch (error) {
                showStatus('networkError', 'error');
                resetBtnState();
            }
        });

        function resetBtnState() {
            submitBtn.disabled = false;
            btnText.style.display = "inline";
            spinner.style.display = "none";
        }

        initLanguage();
    </script>
</body>
</html>
