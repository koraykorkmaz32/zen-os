<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etsy Order Verification</title>
    <style>
        /* General Body Reset (You can merge this with your main CSS) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Dark theme background matching typical login screens */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Main Login-Style Card Container */
        .verification-card {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
        }

        /* Header Styles */
        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .card-header p {
            margin: 0;
            font-size: 14px;
            color: #a0a0a0;
        }

        /* Form Group Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #b3b3b3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input Styles Matching Modern Login Boxes */
        .form-group input {
            width: 100%;
            padding: 14px;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a90e2; /* Accent color on focus */
            background-color: #2a2a2a;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }

        .form-group input::placeholder {
            color: #666;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2; /* Main button color */
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background-color: #357abd;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Footer Link Styles */
        .card-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #2a2a2a;
        }

        .card-footer p {
            margin: 0;
            font-size: 14px;
            color: #a0a0a0;
        }

        .card-footer a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .card-footer a:hover {
            color: #357abd;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="verification-card">
        
        <div class="card-header">
            <h2>Enter Your Order Details</h2>
            <p>On the secure page, enter your email address and your Etsy Order Number (Order ID).</p>
            <p>(You can find your Etsy Order Number on your invoice.)</p>
        </div>

        <form action="https://formspree.io/f/xqegjllr" method="POST">
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your Etsy email" required>
            </div>

            <div class="form-group">
                <label for="order-id">Etsy Order ID</label>
                <input type="text" id="order-id" name="order_id" placeholder="e.g. 1234567890" required>
            </div>

            <label style="display: none !important;">
                Leave this field empty if you're human: <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
            </label>

            <button type="submit" class="submit-btn">Verify Now</button>
        </form>

        <div class="card-footer">
            <p>Already have a code? <a href="http://syncmy.life">Back to Home</a></p>
        </div>

    </div>

</body>
</html>
