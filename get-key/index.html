<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Clean and Clear Form Styles */
        .contact-container {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .contact-header h2 {
            color: #2c3e50;
            margin: 0 0 8px 0;
            font-size: 24px;
        }

        .contact-header p {
            color: #7f8c8d;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            color: #2f3640;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }
        
        .submit-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="contact-container">
    <div class="contact-header">
        <h2>Get in Touch</h2>
        <p>Please fill out the form below for inquiries or further information.</p>
    </div>

    <form action="https://formspree.io/f/xqegjllr" method="POST">
        
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
        </div>

        <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" placeholder="How can we help you?" required></textarea>
        </div>

        <label style="display: none !important;">
            Leave this field empty if you're human: <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
        </label>

        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>

</body>
</html>
