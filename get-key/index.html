<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | SyncMy.Life</title>
    <style>
        /* --- PREMIUM CSS VARIABLES --- */
        :root {
            --bg-gradient: radial-gradient(circle at top left, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --glass-bg: rgba(25, 30, 45, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #00d2ff;
            --primary-gradient: linear-gradient(135deg, #3a7bd5 0%, #00d2ff 100%);
            --text-main: #f0f0f0;
            --text-muted: #a0a5b5;
            --input-bg: rgba(15, 20, 30, 0.7);
            --warning-bg: rgba(255, 170, 0, 0.1);
            --warning-border: rgba(255, 170, 0, 0.4);
            --warning-text: #ffbc42;
            --success-color: #20bf55;
            --error-color: #ff4b4b;
        }

        /* --- GLOBAL RESET & BODY --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- BACKGROUND GLOW EFFECTS --- */
        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 210, 255, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            top: -50px;
            left: -50px;
        }

        .glow-circle-2 {
            position: absolute;
            width: 250px;
            height: 250px;
            background: rgba(58, 123, 213, 0.15);
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            bottom: -50px;
            right: -50px;
        }

        /* --- GLASSMORPHISM CARD --- */
        .contact-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TOP BAR (LANG TOGGLE) --- */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .lang-btn:hover {
            color: var(--text-main);
            border-color: var(--primary-accent);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* --- IMPORTANT WARNING BOX --- */
        .email-warning {
            background: var(--warning-bg);
            border-left: 4px solid var(--warning-border);
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--warning-text);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            line-height: 1.5;
        }

        .email-warning svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            fill: currentColor;
            margin-top: 1px;
        }

        /* --- FORMS --- */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-main);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 15px 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-accent);
            background: rgba(15, 20, 30, 0.9);
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
        }

        .form-control::placeholder {
            color: #5a6072;
        }

        /* --- SUBMIT BUTTON --- */
        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(0, 210, 255, 0.35);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- STATUS MESSAGES --- */
        .status-box {
            display: none;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            animation: floatIn 0.3s ease;
        }

        .status-box.success {
            background: rgba(32, 191, 85, 0.15);
            color: var(--success-color);
            border: 1px solid rgba(32, 191, 85, 0.3);
        }

        .status-box.error {
            background: rgba(255, 75, 75, 0.15);
            color: var(--error-color);
            border: 1px solid rgba(255, 75, 75, 0.3);
        }

        /* --- FOOTER --- */
        .footer {
            margin-top: 30px;
            text-align: center;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .footer a:hover {
            color: var(--primary-accent);
        }
    </style>
</head>
<body>

    <!-- Background Ambience -->
    <div class="glow-circle"></div>
    <div class="glow-circle-2"></div>

    <main class="contact-wrapper">
        <div class="glass-card">
            
            <div class="top-bar">
                <button class="lang-btn" id="langToggle">TR / EN</button>
            </div>

            <header class="header">
                <h2 data-i18n="title">Get in Touch</h2>
                <p data-i18n="subtitle">Have a brilliant idea or a question? We'd love to hear from you.</p>
            </header>

            <form id="contactForm" action="https://formspree.io/f/xqegjllr" method="POST">
                
                <!-- Notice the bold warning box -->
                <div class="email-warning">
                    <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22M12 6l7.53 13H4.47M11 10v4h2v-4m-2 6v2h2v-2"></path></svg>
                    <span data-i18n="warningText">Please double-check your email address. We will use this to get back to you!</span>
                </div>

                <div class="form-group">
                    <label for="name" data-i18n="nameLabel">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" data-i18n-placeholder="namePlaceholder" placeholder="e.g. John Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email" data-i18n="emailLabel">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" data-i18n-placeholder="emailPlaceholder" placeholder="hello@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="message" data-i18n="messageLabel">Your Message</label>
                    <textarea id="message" name="message" class="form-control" data-i18n-placeholder="messagePlaceholder" placeholder="How can we help you today?" required></textarea>
                </div>

                <!-- Formspree Honeypot -->
                <label style="display: none !important;">
                    <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" />
                </label>

                <div id="statusBox" class="status-box"></div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText" data-i18n="btnText">Send Message</span>
                    <span class="spinner" id="spinner"></span>
                </button>
            </form>

            <footer class="footer">
                <a href="http://syncmy.life">
                    <span data-i18n="backHome">← Back to Home</span>
                </a>
            </footer>

        </div>
    </main>

    <script>
        // --- TRANSLATION DICTIONARY ---
        const i18n = {
            en: {
                title: "Get in Touch",
                subtitle: "Have a brilliant idea or a question? We'd love to hear from you.",
                warningText: "Please double-check your email address. We will use this to get back to you!",
                nameLabel: "Full Name",
                namePlaceholder: "e.g. John Doe",
                emailLabel: "Email Address",
                emailPlaceholder: "hello@example.com",
                messageLabel: "Your Message",
                messagePlaceholder: "How can we help you today?",
                btnText: "Send Message",
                btnLoading: "Sending...",
                backHome: "← Back to Home",
                successMsg: "Message sent successfully! Redirecting...",
                errorMsg: "Oops! Something went wrong.",
                networkError: "Network error. Please try again later."
            },
            tr: {
                title: "Bize Ulaşın",
                subtitle: "Harika bir fikriniz veya sorunuz mu var? Sizden haber almayı çok isteriz.",
                warningText: "Lütfen e-posta adresinizin doğruluğundan emin olun. Size bu adres üzerinden geri dönüş yapacağız!",
                nameLabel: "Ad Soyad",
                namePlaceholder: "Örn. Ahmet Yılmaz",
                emailLabel: "E-posta Adresi",
                emailPlaceholder: "merhaba@ornek.com",
                messageLabel: "Mesajınız",
                messagePlaceholder: "Size nasıl yardımcı olabiliriz?",
                btnText: "Mesajı Gönder",
                btnLoading: "Gönderiliyor...",
                backHome: "← Ana Sayfaya Dön",
                successMsg: "Mesajınız başarıyla iletildi! Yönlendiriliyorsunuz...",
                errorMsg: "Hata! Bir şeyler ters gitti.",
                networkError: "Bağlantı hatası. Lütfen daha sonra tekrar deneyin."
            }
        };

        let currentLang = 'en';

        // --- AUTO DETECT LANGUAGE ---
        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            if (userLang.toLowerCase().includes('tr')) {
                currentLang = 'tr';
            } else {
                currentLang = 'en';
            }
            updateUI();
        }

        // --- UPDATE UI TEXT ---
        function updateUI() {
            // Update Inner HTML
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.innerHTML = i18n[currentLang][key];
                }
            });

            // Update Placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (i18n[currentLang][key]) {
                    el.placeholder = i18n[currentLang][key];
                }
            });

            document.getElementById('langToggle').innerText = currentLang === 'en' ? 'TÜRKÇE' : 'ENGLISH';
            document.documentElement.lang = currentLang;
        }

        // Toggle Event
        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'tr' : 'en';
            updateUI();
        });

        // --- FORM SUBMISSION LOGIC ---
        const form = document.getElementById("contactForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const spinner = document.getElementById("spinner");
        const statusBox = document.getElementById("statusBox");

        const showStatus = (messageKey, type) => {
            statusBox.innerHTML = i18n[currentLang][messageKey] || messageKey;
            statusBox.className = `status-box ${type}`;
            statusBox.style.display = "block";
        };

        form.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            
            // UI Loading State
            submitBtn.disabled = true;
            btnText.style.display = "none";
            spinner.style.display = "block";
            statusBox.style.display = "none";
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    showStatus('successMsg', 'success');
                    form.reset();
                    setTimeout(() => {
                        window.location.href = "http://syncmy.life";
                    }, 1800);
                } else {
                    showStatus('errorMsg', 'error');
                    resetBtnState();
                }
            } catch (error) {
                showStatus('networkError', 'error');
                resetBtnState();
            }
        });

        function resetBtnState() {
            submitBtn.disabled = false;
            btnText.style.display = "inline";
            spinner.style.display = "none";
        }

        // Initialize on load
        initLanguage();
    </script>
</body>
</html>
